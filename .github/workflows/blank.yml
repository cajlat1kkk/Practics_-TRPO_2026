name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Копируем репозиторий на виртуальную машину GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Устанавливаем зависимости (если у тебя будет package.json)
      # Если файла нет, этот шаг можно пропустить, но на будущее полезно
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping install."
          fi

      # 4. Простая проверка: убедимся, что index.html существует
      - name: Check for index.html
        run: |
          if [ -f index.html ]; then
            echo "Index file exists. Build check passed."
          else
            echo "Index file is missing!"
            exit 1
          fi

      # 5. Здесь можно добавить запуск линтера или тестов
      - name: Run placeholder tests
        run: echo "Executing tests... All systems green."
