name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        
        with:
          node-version: '20'

      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Сначала подготавливаем среду для Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Теперь добавляем твой шаг из задания
      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Check for index.html
        run: |
          if [ -f index.html ]; then
            echo "Success: index.html exists in root."
          else
            echo "Error: index.html is missing in root!"
            exit 1
          fi

      - name: Run placeholder tests
        run: echo "Все тесты пройдены!"