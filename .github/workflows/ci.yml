name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for index.html
        run: |
          if [ -f index.html ]; then
            echo "Success: index.html exists in root."
          else
            echo "Error: index.html is missing in root!"
            exit 1
          fi

      - name: Run placeholder tests
        run: echo "Все тесты пройдены!"